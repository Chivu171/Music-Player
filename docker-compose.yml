services:
  mongodb:
    image: mongo:6.0
    container_name: music-player-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: music-player-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./my-backend-project
      dockerfile: Dockerfile
    container_name: music-player-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./my-backend-project/.env
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DB_URI: ${DB_URI}
      CLOUD_NAME: ${CLOUD_NAME}
      CLOUD_API_KEY: ${CLOUD_API_KEY}
      CLOUD_API_SECRET: ${CLOUD_API_SECRET}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started

volumes:
  mongo-data:
  redis-data: